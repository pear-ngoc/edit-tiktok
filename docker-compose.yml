services:
  telegram-bot-api:
    image: ghcr.io/bots-house/docker-telegram-bot-api:latest
    container_name: edit-tiktok-telegram-bot-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
    command:
      - --local
      - --dir=/var/lib/telegram-bot-api
      - --verbosity=1
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
      - ./output:/app/output:ro
    ports:
      - "8081:8081"

  edit-tiktok:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edit-tiktok
    restart: unless-stopped
    depends_on:
      - telegram-bot-api
    env_file:
      - .env
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_API_BASE_URL: ${TELEGRAM_BOT_API_BASE_URL:-http://telegram-bot-api:8081/bot}
      TELEGRAM_BOT_API_FILE_URL: ${TELEGRAM_BOT_API_FILE_URL:-http://telegram-bot-api:8081/file/bot}
      TELEGRAM_BOT_API_LOCAL_MODE: ${TELEGRAM_BOT_API_LOCAL_MODE:-true}
      REVID_API_KEY: ${REVID_API_KEY:-}
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./assets:/app/assets
      - ./configs:/app/configs
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    command: ["python", "main.py", "worker"]

volumes:
  telegram-bot-api-data:
