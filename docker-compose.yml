  edit-tiktok:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edit-tiktok
    restart: unless-stopped
    depends_on:
      - telegram-bot-api
    env_file:
      - .env
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # TELEGRAM_BOT_API_BASE_URL: ${TELEGRAM_BOT_API_BASE_URL:-http://telegram-bot-api:8081/bot}
      # TELEGRAM_BOT_API_FILE_URL: ${TELEGRAM_BOT_API_FILE_URL:-http://telegram-bot-api:8081/file/bot}
      # TELEGRAM_BOT_API_LOCAL_MODE: ${TELEGRAM_BOT_API_LOCAL_MODE:-true}
      REVID_API_KEY: ${REVID_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/app/secrets/google-drive-service-account.json}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      GOOGLE_DRIVE_AUTH_METHOD: ${GOOGLE_DRIVE_AUTH_METHOD:-}
      GOOGLE_OAUTH_CLIENT_SECRETS_FILE: ${GOOGLE_OAUTH_CLIENT_SECRETS_FILE:-/app/secrets/google-drive-oauth-client.json}
      GOOGLE_OAUTH_TOKEN_FILE: ${GOOGLE_OAUTH_TOKEN_FILE:-/app/data/google-drive-token.json}
      HF_HOME: ${HF_HOME:-/root/.cache/huggingface}
      HUGGINGFACE_HUB_CACHE: ${HUGGINGFACE_HUB_CACHE:-/root/.cache/huggingface/hub}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./assets:/app/assets
      - ./configs:/app/configs
      - ./logs:/app/logs
      - ./data:/app/data
      - ./data/huggingface:/root/.cache/huggingface
      - ./secrets:/app/secrets:ro
      - ./config.yaml:/app/config.yaml
    command: ["python", "main.py", "worker"]

volumes:
  telegram-bot-api-data:
